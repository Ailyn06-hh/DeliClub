<!-- ===== SCREEN: USER PROFILE ===== -->
<div id="screen-profile" class="screen">
  <div class="container">

    <!-- Header -->
    <div class="profile-header-bar">
      <span class="back-arrow" onclick="closeProfile()" title="Regresar">&#8592;</span>
      <div class="header-logo">DeliClub</div>
    </div>

    <!-- Avatar & basic info -->
    <div class="profile-hero">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profile-avatar-img"></div>
      </div>
      <h2 class="profile-username" id="profile-username">Usuario</h2>
      <p class="profile-bio" id="profile-bio">Amante de la gastronomía</p>
    </div>

    <!-- Delipoints card -->
    <div class="profile-card delipoints-card">
      <div class="delipoints-info">
        <span class="delipoints-label">Delipoints</span>
        <div class="delipoints-mxn" id="profile-delipoints-mxn">$ 0.00 MXN</div>
        <div class="delipoints-sol" id="profile-delipoints-sol">0.000 SOL</div>
      </div>
      <div class="delipoints-icon">🎁</div>
    </div>

    <!-- Mi Wallet -->
    <div class="profile-section-title">Mi Wallet</div>
    <div class="profile-card wallet-card" id="profile-wallet-card">
      <div>
        <div class="wallet-card-status" id="profile-wallet-status-label">Sin wallet conectada</div>
        <div class="wallet-card-address" id="profile-wallet-address">—</div>
      </div>
      <a class="wallet-card-link" id="profile-wallet-link" href="#" target="_blank" style="display:none;">
        <span>&#x1F5D7;</span><br><small>Ver</small>
      </a>
    </div>

    <!-- Reservas -->
    <div class="profile-section-title">Reservas</div>
    <div class="profile-card calendar-card">
      <div class="cal-nav">
        <button class="cal-btn" onclick="profileCalPrev()">&#8249;</button>
        <div class="cal-selectors">
          <select id="cal-month" onchange="profileCalRender()"></select>
          <select id="cal-year" onchange="profileCalRender()"></select>
        </div>
        <button class="cal-btn" onclick="profileCalNext()">&#8250;</button>
      </div>
      <div class="cal-grid" id="profile-cal-grid"></div>
    </div>

    <!-- Historial de compras -->
    <div class="profile-section-title">
      Mis compras
      <span class="profile-section-sub">Recientes</span>
    </div>
    <div id="profile-purchases-list">
      <div class="loading">Cargando compras...</div>
    </div>

    <!-- Logout -->
    <button class="btn-logout" onclick="confirmLogout()">
      🚪 Cerrar Sesión
    </button>

    <div style="height: 30px;"></div>
  </div>
</div>
