<!-- Eliminar / Editar Menu View -->
<div id="screen-eliminar-editar-menu" class="screen">
  <!-- Header -->
  <div class="suc-header" style="margin-bottom: 20px;">
    <span class="suc-back-arrow" onclick="backToMenuActivo()">←</span>
    <h1 class="suc-title" style="text-align: center; width: 100%; margin-left: -26px; color: #7f523c;">Eliminar Menú</h1>
  </div>

  <!-- Tabs -->
  <div class="em-tabs">
    <button id="em-tab-eliminar" class="em-tab-btn active" onclick="setEliminarTab('eliminar')">Eliminar</button>
    <button id="em-tab-editar" class="em-tab-btn" onclick="setEliminarTab('editar')">Editar</button>
  </div>

  <!-- Cards Container -->
  <div id="em-cards-container" style="padding: 10px 20px; max-width: 500px; margin: 0 auto;">
    <!-- Dynamically populated -->
  </div>
</div>
