<!-- Restaurant Details View -->
<div id="screen-restaurant-details" class="screen">
  <!-- Header -->
  <div class="suc-header">
    <span class="suc-back-arrow" onclick="backToSucursales()">←</span>
    <h1 class="suc-title">...</h1>
  </div>

  <!-- Resumen del Día -->
  <div class="rd-detail-card bg-cream">
    <div class="rd-detail-card-title">Resumen del Día</div>
    <div class="rd-detail-row">
      <div class="rd-detail-icon-large">🕒</div>
      <div class="rd-detail-info">
        <div class="rd-detail-amount">$2,500.00</div>
        <div class="rd-detail-subtext">Ventas Hoy</div>
      </div>
    </div>
  </div>

  <!-- Estatus del restaurante -->
  <div class="rd-detail-card bg-cream flex-row-between">
    <div class="rd-detail-card-title-inline">Estatus del restaurante</div>
    <div class="rd-status-controls">
      <label class="rd-switch">
        <input type="checkbox" checked>
        <span class="rd-slider"></span>
      </label>
      <span class="rd-status-text">Abierto</span>
      <span class="rd-location-icon">📍</span>
    </div>
  </div>

  <!-- Schedule -->
  <div class="rd-detail-card bg-cream outline" style="padding: 15px 20px;">
    <div class="rd-schedule-list" id="rd-schedule-container">
      <!-- Generated dynamically in JS -->
    </div>
    <button class="btn-primary" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 15px;" onclick="saveRestaurantSchedule()">Guardar Horarios</button>
  </div>

  <!-- Quick Access -->
  <div class="rd-access-grid">
    <div class="rd-detail-card bg-cream center-content">
      <div class="rd-detail-card-title center">Pedidos</div>
      <div class="rd-large-icon">🔥</div>
    </div>
    <div class="rd-detail-card bg-cream center-content" style="cursor: pointer;" onclick="openMenuActivo()">
      <div class="rd-detail-card-title center">Menú Activo</div>
      <div class="rd-large-icon">📖</div>
      <div class="rd-detail-subtext small">1 platillos/secciones</div>
    </div>
    <div class="rd-detail-card bg-cream center-content full-width" style="margin-top: 15px; width: 50%; margin-left: auto; margin-right: auto; cursor: pointer;" onclick="openReservacionesClicli()">
      <div class="rd-detail-card-title center">Nuevas<br>Reservas</div>
      <div class="rd-large-icon">📅</div>
    </div>
  </div>

  <!-- Ecosistema BlockChain y Recompensas -->
  <div class="rd-detail-card bg-cream mt-20">
    <div class="rd-rewards-row" style="margin-top: 0;">
      <div class="rd-reward-col" style="flex: 1;">
        <div class="rd-reward-label" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
          Delipoints Canjeados
          <span class="rd-link-icon" style="font-size: 16px;">🔗</span>
        </div>
        <div class="rd-reward-value" id="rd-delipoints-mxn">$0.00 MXN</div>
        <div class="rd-reward-value" id="rd-delipoints-sol" style="font-size: 12px; color: #9945FF; margin-top: 4px;">0.000 SOL</div>
      </div>
    </div>
  </div>
</div>
